# ==============================================================================
# HealthAI Infrastructure — Docker Compose (production-ready)
#
# Images are pulled from GitHub Container Registry (ghcr.io).
# All secrets must be provided via a .env file (see .env.example).
# ==============================================================================

name: healthai

services:

  # ----------------------------------------------------------------------------
  # PostgreSQL — base ZITADEL (IAM)
  # ----------------------------------------------------------------------------
  postgres-zitadel:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zitadel
      POSTGRES_USER: zitadel
      POSTGRES_PASSWORD: ${POSTGRES_ZITADEL_PASSWORD}
    volumes:
      - postgres_zitadel_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zitadel -d zitadel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # ZITADEL init — runs DB migrations / schema initialisation then exits
  # ----------------------------------------------------------------------------
  zitadel-init:
    image: ghcr.io/zitadel/zitadel:v2.67.5
    restart: on-failure
    command: init
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres-zitadel
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_ZITADEL_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ZITADEL_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
    networks:
      - internal
    depends_on:
      postgres-zitadel:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # ZITADEL — identity & access management (users + M2M)
  # ----------------------------------------------------------------------------
  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.67.5
    restart: unless-stopped
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY}" --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres-zitadel
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_ZITADEL_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ZITADEL_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALHOST: localhost
    ports:
      - "8080:8080"
    networks:
      - internal
    depends_on:
      postgres-zitadel:
        condition: service_healthy
      zitadel-init:
        condition: service_completed_successfully
    # Image distroless — pas de shell ni d'outil réseau disponible pour healthcheck
    # Les services dépendants utilisent restart: unless-stopped pour se reconnecter

  # ----------------------------------------------------------------------------
  # PostgreSQL — base applicative HealthAI
  # ----------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-healthai_db}
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthai} -d ${POSTGRES_DB:-healthai_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # db-migrator — applique les migrations SQL via golang-migrate
  # Tourne une fois au démarrage puis s'arrête (restart: on-failure)
  # Ajouter une nouvelle migration : db/migrations/00000X_description.{up,down}.sql
  # ----------------------------------------------------------------------------
  db-migrator:
    image: migrate/migrate:latest
    restart: on-failure
    command:
      - "-path=/migrations"
      - "-database=postgresql://${POSTGRES_USER:-healthai}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-healthai_db}?sslmode=disable"
      - "up"
    volumes:
      - ./db/migrations:/migrations:ro
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # MongoDB — historique / traces des services IA (vision, workout)
  # Pas de port publié : accessible uniquement via le réseau interne.
  # ----------------------------------------------------------------------------
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-healthai}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # healthai-api — backend REST API
  # ----------------------------------------------------------------------------
  healthai-api:
    image: ghcr.io/healthai-corpo/healthai-api:${API_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-healthai}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-healthai_db}
      NODE_ENV: production
      PORT: 3001
      TYPEORM_RUN_MIGRATIONS: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600s}
      JWT_ISSUER: ${JWT_ISSUER:-healthai-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-healthai-web}
      API_KEY: ${API_KEY}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      FRONTEND_CLIENT_ID: ${FRONTEND_CLIENT_ID:-healthai-admin-front}
    ports:
      - "3001:3001"
    networks:
      - internal
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      zitadel:
        condition: service_started

  # ----------------------------------------------------------------------------
  # healthai-etl — pipeline ETL + endpoint upload
  # ----------------------------------------------------------------------------
  healthai-etl:
    image: ghcr.io/healthai-corpo/healthai-etl:${ETL_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-healthai}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-healthai_db}
      ZITADEL_ISSUER: http://zitadel:8080
      ETL_CLIENT_ID: ${ETL_CLIENT_ID}
      ETL_CLIENT_SECRET: ${ETL_CLIENT_SECRET}
    ports:
      - "8000:8000"
    volumes:
      - etl_data:/app/data
      - etl_logs:/app/logs
    networks:
      - internal
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      zitadel:
        condition: service_started

  # ----------------------------------------------------------------------------
  # healthai-admin — dashboard CRUD (interne équipe)
  # ----------------------------------------------------------------------------
  healthai-admin:
    image: ghcr.io/healthai-corpo/healthai-admin:${ADMIN_TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_NESTJS_URL: ${PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_FASTAPI_URL: ${PUBLIC_ETL_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_KEY: ${API_KEY}
      NEXT_PUBLIC_CLIENT_ID: ${FRONTEND_CLIENT_ID:-healthai-admin-front}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${PUBLIC_ADMIN_URL:-http://localhost:3000}
      ZITADEL_ISSUER: ${PUBLIC_ZITADEL_URL:-http://localhost:8080}
      ZITADEL_CLIENT_ID: ${ADMIN_ZITADEL_CLIENT_ID}
      ZITADEL_CLIENT_SECRET: ${ADMIN_ZITADEL_CLIENT_SECRET}
      NODE_ENV: production
    # extra_hosts permet au container d'atteindre ZITADEL via localhost:8080
    # host-gateway = IP du bridge Docker → ZITADEL exposé sur le host (port 8080)
    # Le Host header HTTP reste "localhost:8080", ce que ZITADEL attend.
    extra_hosts:
      - "localhost:host-gateway"
    ports:
      - "3000:3000"
    networks:
      - internal
    depends_on:
      - healthai-api

  # ----------------------------------------------------------------------------
  # healthai-web — portail client (M3+, désactivé par défaut)
  # Démarrer avec : docker compose --profile web up -d
  # ----------------------------------------------------------------------------
  healthai-web:
    profiles: ["web"]
    image: ghcr.io/healthai-corpo/healthai-web:${WEB_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_ZITADEL_ISSUER: ${PUBLIC_ZITADEL_URL:-http://localhost:8080}
      NODE_ENV: production
    networks:
      - internal
    depends_on:
      - healthai-api

  # ----------------------------------------------------------------------------
  # Services IA (healthai-ai) — gateway + vision + workout + Ollama
  # Seul le gateway est exposé (8003). vision/workout/ollama restent internes.
  # ----------------------------------------------------------------------------
  healthai-ai-gateway:
    image: ghcr.io/healthai-corpo/healthai-ai-gateway:${AI_GATEWAY_TAG:-latest}
    restart: unless-stopped
    environment:
      # Mode d'authentification : "jwks" en prod (validation JWT Zitadel),
      # "dev_stub" pour court-circuiter l'auth en local sans Zitadel.
      AUTH_MODE: ${AI_AUTH_MODE:-jwks}
      VISION_SERVICE_URL: http://healthai-vision:8001
      WORKOUT_SERVICE_URL: http://healthai-workout:8002
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-healthai}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-healthai_db}
      ZITADEL_ISSUER: http://zitadel:8080
      # Audience JWT attendue : par defaut on reutilise l'app `healthai-admin-front`
      # pour que le meme token Zitadel donne acces au backend ET aux services IA.
      JWT_AUDIENCE: ${AI_JWT_AUDIENCE:-${ADMIN_ZITADEL_CLIENT_ID:-}}
      # Role projet exige (vide = juste authentification, pas de check de role).
      # Si pas de role `ai-user` dans Zitadel, laisse vide.
      ZITADEL_REQUIRED_ROLE: ${AI_REQUIRED_ROLE:-}
      CORS_ORIGINS: ${FRONTEND_ORIGIN:-http://localhost:3000}
    ports:
      - "8003:8000"
    networks:
      - internal
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      zitadel:
        condition: service_started
      healthai-vision:
        condition: service_started
      healthai-workout:
        condition: service_started

  healthai-vision:
    image: ghcr.io/healthai-corpo/healthai-vision:${VISION_TAG:-latest}
    init: true
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-healthai}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-healthai_db}
      MONGODB_URL: mongodb://${MONGO_USER:-healthai}:${MONGO_PASSWORD}@mongo:27017/?authSource=admin
      MONGODB_DB_NAME: healthai_db
      OLLAMA_BASE_URL: http://healthai-ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_KEEP_ALIVE: 24h
      HF_MODEL_NAME: ${HF_MODEL_NAME:-yolov8n.pt}
      HF_CACHE_DIR: /app/.hf_cache
    volumes:
      - hf_cache:/app/.hf_cache
    networks:
      - internal
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
      ollama:
        condition: service_started

  healthai-workout:
    image: ghcr.io/healthai-corpo/healthai-workout:${WORKOUT_TAG:-latest}
    init: true
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-healthai}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-healthai_db}
      MONGODB_URL: mongodb://${MONGO_USER:-healthai}:${MONGO_PASSWORD}@mongo:27017/?authSource=admin
      MONGODB_DB_NAME: healthai_workout
      OLLAMA_BASE_URL: http://healthai-ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    networks:
      - internal
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
      ollama:
        condition: service_started

  # --- LLM centralisé (interne) ---
  ollama:
    image: ollama/ollama:latest
    container_name: healthai-ollama
    restart: unless-stopped
    volumes:
      - ollama_storage:/root/.ollama
    networks:
      - internal
    command: ["serve"]

  # --- Téléchargement automatique du modèle SLM (one-shot) ---
  ollama-pull-model:
    image: ollama/ollama:latest
    container_name: healthai-ollama-pull
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - internal
    depends_on:
      - ollama
    volumes:
      - ollama_storage:/root/.ollama
    entrypoint: /bin/sh
    command: -c "until ollama list >/dev/null 2>&1; do echo 'attente du serveur ollama...'; sleep 2; done && ollama pull ${OLLAMA_MODEL:-llama3.2:3b}"

  # ----------------------------------------------------------------------------
  # Metabase — dashboards analytics connecté à healthai_db
  # ----------------------------------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${POSTGRES_DB:-healthai_db}
      MB_DB_USER: ${POSTGRES_USER:-healthai}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
    ports:
      - "3002:3000"
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # Prometheus — métriques (optionnel)
  # ----------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - internal

  # ----------------------------------------------------------------------------
  # Adminer — inspection DB (dev / démo)
  # ----------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  postgres_zitadel_data:
  postgres_app_data:
  mongo_data:
  etl_data:
  etl_logs:
  hf_cache:
  ollama_storage:

# ==============================================================================
# Networks
# ==============================================================================
networks:
  internal:
    driver: bridge
