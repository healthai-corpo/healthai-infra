global:
  scrape_interval: 15s

scrape_configs:
  # 1. Monitoring du Backend NestJS
  - job_name: "healthai_api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["healthai-api:3001"]

  # 2. Monitoring de la Gateway IA (important pour voir les temps de réponse de l'IA)
  - job_name: "healthai_ai_gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["healthai-ai-gateway:8000"]
