global:
    scrape_interval: 15s

scrape_configs:
    # 1. cAdvisor — métriques CPU/RAM/réseau/disque par conteneur Docker
    - job_name: "cadvisor"
      static_configs:
          - targets: ["cadvisor:8080"]

    # 2. node-exporter — métriques de la machine hôte
    - job_name: "node_exporter"
      static_configs:
          - targets: ["node-exporter:9100"]

    # 3. Prometheus lui-même
    - job_name: "prometheus"
      static_configs:
          - targets: ["localhost:9090"]

