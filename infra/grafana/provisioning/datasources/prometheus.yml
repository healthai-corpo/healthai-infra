apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      # Permet à Grafana de lire les règles d'alerte chargées par Prometheus
      # (infra/prometheus/alerts.yml) et de les afficher dans Alerting > Alert rules.
      manageAlerts: true
